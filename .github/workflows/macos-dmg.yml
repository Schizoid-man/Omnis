name: macOS DMG Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: omnis-tui/web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm --prefix omnis-tui/web ci

      - name: Install Tauri CLI native bindings
        run: npm --prefix omnis-tui/web install --no-save @tauri-apps/cli-darwin-arm64@2.9.1 @tauri-apps/cli-darwin-x64@2.9.1

      - name: Build DMG bundle
        run: npm --prefix omnis-tui/web run tauri -- build --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnis-desktop-macos-dmg
          path: omnis-tui/src-tauri/target/release/bundle/dmg/*.dmg
