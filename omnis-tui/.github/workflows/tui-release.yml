name: TUI Release

on:
  push:
    tags:
      - "tui-v*"          # trigger on tags like tui-v1.0.0
  workflow_dispatch:      # also allow manual runs

permissions:
  contents: write         # needed to create GitHub Releases

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────
  # Windows — static binary via MSVC + CRT-static
  # ─────────────────────────────────────────────
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            omnis-tui/target
          key: windows-cargo-${{ hashFiles('omnis-tui/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binary
        working-directory: omnis-tui
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Rename artifacts
        run: |
          Copy-Item `
            omnis-tui\target\x86_64-pc-windows-msvc\release\omnis.exe `
            omnis-windows-x86_64.exe
          Copy-Item `
            omnis-tui\target\x86_64-pc-windows-msvc\release\omnis-launcher.exe `
            omnis-launcher.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnis-windows-x86_64
          path: |
            omnis-windows-x86_64.exe
            omnis-launcher.exe

  # ─────────────────────────────────────────────
  # Linux — fully static binary via musl
  # ─────────────────────────────────────────────
  build-linux:
    name: Build (Linux x86_64 musl)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            omnis-tui/target
          key: linux-musl-cargo-${{ hashFiles('omnis-tui/Cargo.lock') }}
          restore-keys: linux-musl-cargo-

      - name: Build release binary
        working-directory: omnis-tui
        run: cargo build --release --target x86_64-unknown-linux-musl
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
          CC_x86_64_unknown_linux_musl: musl-gcc

      - name: Rename artifact
        run: |
          cp omnis-tui/target/x86_64-unknown-linux-musl/release/omnis \
             omnis-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnis-linux-x86_64
          path: omnis-linux-x86_64

  # ─────────────────────────────────────────────
  # macOS — universal binary (x86_64 + arm64) + .app bundle
  # ─────────────────────────────────────────────
  build-macos:
    name: Build (macOS universal)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + both Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            omnis-tui/target
          key: macos-cargo-${{ hashFiles('omnis-tui/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build x86_64
        working-directory: omnis-tui
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        working-directory: omnis-tui
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary with lipo
        run: |
          lipo -create \
            omnis-tui/target/x86_64-apple-darwin/release/omnis \
            omnis-tui/target/aarch64-apple-darwin/release/omnis \
            -output omnis-universal

      - name: Build .app bundle
        run: |
          mkdir -p Omnis.app/Contents/MacOS
          mkdir -p Omnis.app/Contents/Resources

          # Copy universal binary
          cp omnis-universal Omnis.app/Contents/MacOS/omnis
          chmod +x Omnis.app/Contents/MacOS/omnis

          # Launcher script — opens omnis inside a new Terminal.app window
          cat > Omnis.app/Contents/MacOS/Omnis << 'LAUNCHER'
          #!/bin/bash
          BINARY="$(cd "$(dirname "$0")" && pwd)/omnis"
          osascript << APPLESCRIPT
          tell application "Terminal"
              activate
              do script "$BINARY"
          end tell
          APPLESCRIPT
          LAUNCHER
          chmod +x Omnis.app/Contents/MacOS/Omnis

          # Info.plist
          cat > Omnis.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>         <string>Omnis</string>
            <key>CFBundleDisplayName</key>  <string>Omnis</string>
            <key>CFBundleIdentifier</key>   <string>com.omnis.tui</string>
            <key>CFBundleVersion</key>      <string>1.0</string>
            <key>CFBundleExecutable</key>   <string>Omnis</string>
            <key>CFBundlePackageType</key>  <string>APPL</string>
            <key>LSUIElement</key>          <true/>
            <key>NSHighResolutionCapable</key> <true/>
          </dict>
          </plist>
          PLIST

      - name: Zip .app bundle
        run: zip -r omnis-macos-universal.zip Omnis.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnis-macos-universal
          path: omnis-macos-universal.zip

  # ─────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: omnis-windows-x86_64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: omnis-linux-x86_64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: omnis-macos-universal

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Omnis TUI ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            omnis-windows-x86_64.exe
            omnis-launcher.exe
            omnis-linux-x86_64
            omnis-macos-universal.zip
